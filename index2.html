<div id="notes"></div>

<script>
  async function loadNotes() {
    const response = await fetch("https://hihfmtsvtaa7jwuv.public.blob.vercel-storage.com/notes.json.txt");
    const notes = await response.json();

    const container = document.getElementById("notes");

    notes.forEach(note => {
      const div = document.createElement("div");
      div.innerHTML = `
        <h2>${note.title}</h2>
        <p>${note.content}</p>
        <hr/>
      `;
      container.appendChild(div);
    });
  }

  loadNotes();
</script>
