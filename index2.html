<div id="notes"></div>

<script>
  async function loadNotes() {
    try {
      const response = await fetch("https://hihfmtsvtaa7jwuv.public.blob.vercel-storage.com/notes.json.txt");
      
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      
      const notes = await response.json();
      const container = document.getElementById("notes");

      notes.forEach(note => {
        const div = document.createElement("div");
        div.innerHTML = `
          <h2>${note.title}</h2>
          <p>${note.content}</p>
          <hr/>
        `;
        container.appendChild(div);
      });
    } catch (error) {
      console.error("Error loading notes:", error);
      document.getElementById("notes").innerHTML = `<p>Error loading notes: ${error.message}</p>`;
    }
  }

  loadNotes();
</script>
